name: Run Data Factory (Gemini)

on:
  workflow_dispatch:          # تشغيل يدوي
  schedule:
    - cron: '0 2 * * *'       # يومياً الساعة 2 صباحاً

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360       # 6 ساعات كحد أقصى

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Upgrade pip and install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade google-genai datasets tqdm pyyaml json5
        # التحقق من التثبيت
        pip show google-genai || echo "⚠️ google-genai not found"

    - name: Restore previous output files (cache)
      uses: actions/cache@v4
      with:
        path: |
          data/enriched_training_data.jsonl
          data/failed_samples.jsonl
        key: datafactory-gemini-${{ github.run_id }}
        restore-keys: |
          datafactory-gemini-

    - name: Run data factory
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python datafactory.py

    - name: Upload artifacts (results)
      uses: actions/upload-artifact@v4
      with:
        name: enriched-data
        path: |
          data/*.jsonl
          data/*.json
        if-no-files-found: warn
