name: Run Data Factory (Long-running)

on:
  workflow_dispatch:         # تشغيل يدوي
  schedule:
    - cron: '0 2 * * *'      # تشغيل تلقائي يومياً

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # متاح لحد 6 ساعات

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install huggingface_hub google-genai datasets tqdm pyyaml json5

    # استعادة الملفات لضمان عدم تكرار العينات (Resume)
    - name: Restore previous output files
      id: cache-output
      uses: actions/cache@v4
      with:
        path: |
          enriched_training_data.jsonl
          failed_samples.jsonl
          pending_grammar_items.json
        key: datafactory-output-${{ github.run_id }}
        restore-keys: |
          datafactory-output-
    - name: Run data factory
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        HF_API_KEY: ${{ secrets.HF_API_KEY }}
      run: |
        # تثبيت المكتبات والتأكد من وجودها في نفس الجلسة
        python -m pip install --upgrade pip
        pip install huggingface_hub google-genai datasets tqdm pyyaml json5
        


    # رفع النتائج كـ Artifact عشان تحملها وتطمن على "زيكو"
    - name: Upload output files
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: datafactory-results
        path: |
          enriched_training_data.jsonl
          failed_samples.jsonl
          pending_grammar_items.json

    # حفظ الملفات في الكاش للمرة القادمة
    - name: Save output to cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: |
          enriched_training_data.jsonl
          failed_samples.jsonl
          pending_grammar_items.json
        key: datafactory-output-${{ github.run_id }}
