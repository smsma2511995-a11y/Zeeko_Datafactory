name: Run Data Factory (Long-running)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install huggingface_hub google-genai datasets tqdm pyyaml json5

    - name: Restore previous output files
      id: cache-output
      uses: actions/cache@v4
      with:
        path: |
          data/
          pending_grammar_items.json
        key: datafactory-output-${{ github.run_id }}
        restore-keys: |
          datafactory-output-

    - name: Run data factory
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        HF_API_KEY: ${{ secrets.HF_API_KEY }}
      run: |
        python datafactory.py

    - name: Upload output files as artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: enriched-data
        path: |
          data/
          pending_grammar_items.json
        retention-days: 30
