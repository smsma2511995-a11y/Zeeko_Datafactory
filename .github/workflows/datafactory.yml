name: Run Data Factory (Gemini)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Upgrade pip and install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # تحقق من التثبيت
        pip list | grep google-genai || (echo "⚠️ google-genai not found" && exit 1)

    - name: Restore previous output files
      uses: actions/cache@v4
      with:
        path: |
          data/enriched_training_data.jsonl
          data/failed_samples.jsonl
        key: datafactory-gemini-${{ github.run_id }}
        restore-keys: |
          datafactory-gemini-

    - name: Run data factory
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python datafactory.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: enriched-data
        path: |
          data/*.jsonl
          data/*.json
        if-no-files-found: warn
