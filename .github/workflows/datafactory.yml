name: Run Data Factory (Long-running)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run data factory
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        HF_API_KEY: ${{ secrets.HF_API_KEY }}
      run: |
        # 1. التثبيت باستخدام python -m لضمان المسار الصحيح
        python -m pip install --upgrade pip
        python -m pip install huggingface_hub google-genai datasets tqdm pyyaml json5
        
        # 2. إنشاء ملف config.yaml بتنسيق سليم جداً يوافق كود الـ Python بتاعك
        cat <<EOF > config.yaml
        gemini:
          api_keys: []
        data:
          max_samples: 100
        EOF

        # 3. تشغيل السكربت مع طباعة الأخطاء لو حصلت
        python datafactory.py || { echo "❌ السكربت فشل.. دي آخر سطور قبل الوقوع:"; exit 1; }

    - name: Upload output files as Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: datafactory-results
        path: |
          *.jsonl
          *.json
