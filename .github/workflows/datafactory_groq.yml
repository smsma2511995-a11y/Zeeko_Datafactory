name: Data Factory with GROQ

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            data/enriched_training_data.jsonl
            data/failed_samples.jsonl
          key: datafactory-groq-${{ github.run_id }}
          restore-keys: datafactory-groq-

      - name: Run data factory
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python datafactory_groq.py

      - name: Upload output files as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enriched-data-${{ github.run_id }}
          path: |
            data/*.jsonl
            data/*.json
          if-no-files-found: warn
          retention-days: 7
